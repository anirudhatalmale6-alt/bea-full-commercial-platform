name: british-english-academy-esl-platform
region: lon
services:
  - name: web
    github:
      repo: YOUR_GITHUB_ORG/british-english-academy-esl-platform
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    build_command: npm install && npm run build
    run_command: npm run start
    http_port: 3000
    instance_count: 2
    instance_size_slug: basic-xs
    routes:
      - path: /
    health_check:
      http_path: /api/health
      initial_delay_seconds: 20
      period_seconds: 10
    envs:
      - key: NEXT_PUBLIC_SITE_URL
        scope: RUN_AND_BUILD_TIME
        value: https://YOUR-LIVE-DOMAIN
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${british-english-academy-db.DATABASE_URL}
      - key: CERTIFICATE_SIGNING_KEY
        scope: RUN_TIME
        type: SECRET
        value: replace-in-dashboard
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: replace-in-dashboard
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
        value: replace-in-dashboard
      - key: STRIPE_PLACEMENT_PRICE_ID
        scope: RUN_TIME
        type: SECRET
        value: replace-in-dashboard
      - key: ALLOW_DEMO_ACCESS
        scope: RUN_TIME
        value: "false"
databases:
  - name: british-english-academy-db
    engine: PG
    version: "16"
    size: db-s-dev-database
